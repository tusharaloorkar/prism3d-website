<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism3D — Generate Payment QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #060b16;
      --surface: #0d1526;
      --border:  rgba(148,197,255,.14);
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --violet:  #38bdf8;
      --cyan:    #ec4899;
      --gold:    #fbbf24;
      --ff-body: 'Space Grotesk', sans-serif;
      --ff-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .eyebrow {
      font-family: var(--ff-mono); font-size: .68rem; letter-spacing: .4em;
      text-transform: uppercase; color: var(--cyan); margin-bottom: 14px; text-align: center;
    }

    h1 {
      font-size: 1.6rem; font-weight: 700; letter-spacing: -.01em;
      text-align: center; margin-bottom: 8px;
    }
    h1 span {
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .sub {
      text-align: center; color: var(--muted); font-size: .9rem;
      margin-bottom: 32px; line-height: 1.6;
    }

    label {
      display: block; font-family: var(--ff-mono); font-size: .68rem;
      letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
    }

    .amount-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
      padding: 4px 4px 4px 18px; margin-bottom: 28px;
      transition: border-color .2s;
    }
    .amount-row:focus-within { border-color: var(--violet); }
    .currency { font-family: var(--ff-mono); color: var(--gold); font-weight: 700; }
    .amount-row input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--ff-mono); font-size: 1.3rem; font-weight: 700;
      padding: 12px 0;
      min-width: 0;
    }
    .gen-btn {
      font-family: var(--ff-mono); font-size: .75rem; letter-spacing: .12em;
      text-transform: uppercase; font-weight: 700; white-space: nowrap;
      padding: 14px 20px; border: none; border-radius: 9px; cursor: pointer;
      background: linear-gradient(135deg, var(--violet), var(--cyan)); color: #06111f;
      transition: transform .2s, box-shadow .2s;
    }
    .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56,189,248,.35); }
    .gen-btn:active { transform: translateY(0); }

    .qr-stage {
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    .card-preview {
      width: 100%; max-width: 300px; border-radius: 16px;
      display: block;
    }
    .card-loading {
      width: 100%; max-width: 300px; aspect-ratio: 640/820;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-mono); font-size: .68rem; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
    }

    .upi-link {
      width: 100%; font-family: var(--ff-mono); font-size: .68rem; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; word-break: break-all; text-align: center; line-height: 1.5;
    }

    .actions { display: flex; gap: 10px; width: 100%; }
    .actions button, .actions a {
      flex: 1; text-align: center; text-decoration: none; cursor: pointer;
      font-family: var(--ff-mono); font-size: .7rem; letter-spacing: .12em;
      text-transform: uppercase; padding: 12px; border-radius: 9px;
      border: 1px solid var(--border); color: var(--text); background: none;
      transition: border-color .2s, color .2s;
    }
    .actions button:hover, .actions a:hover { border-color: var(--violet); color: var(--violet); }
    .actions .primary { border-color: var(--violet); color: var(--violet); }

    .hint {
      font-family: var(--ff-mono); font-size: .62rem; color: var(--muted);
      text-align: center; line-height: 1.6;
    }

    footer {
      text-align: center; margin-top: 32px;
      font-family: var(--ff-mono); font-size: .62rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="eyebrow">Prism3D</p>
    <h1>Generate <span>Payment QR</span></h1>
    <p class="sub">Enter an amount to create a branded, ready-to-share payment QR card for a customer.</p>

    <label for="amount">Amount (INR)</label>
    <div class="amount-row">
      <span class="currency">₹</span>
      <input type="number" id="amount" min="1" step="1" value="235" inputmode="numeric" />
      <button class="gen-btn" id="genBtn">Generate</button>
    </div>

    <div class="qr-stage">
      <div class="card-loading" id="cardLoading">Building card…</div>
      <img class="card-preview" id="cardPreview" alt="Prism3D payment QR card" style="display:none;" />
      <p class="upi-link" id="upiLink"></p>
      <div class="actions">
        <button class="primary" id="downloadBtn">Download</button>
        <button id="shareBtn" style="display:none;">Share</button>
        <a href="#" id="payLink" target="_blank" rel="noopener">Open in UPI app</a>
      </div>
      <p class="hint">Download or Share sends the full branded card — ready to send straight to a customer on WhatsApp.</p>
    </div>

    <footer>crafted layer by layer</footer>
  </div>

const UPI_PA = '8484080651@ybl';
const UPI_PN = 'Prism3D';

function buildUpiLink(amount) {

  return 'upi://pay?' + params.toString();

const logoReady = new Promise(res => { logoImg.onload = res; logoImg.onerror = res; });

async function ensureAssetsReady() {
  const specs = [
    '700 68px "Space Grotesk"',
    '400 15px "Space Grotesk"',
    '700 13px "Space Mono"',
    '400 13px "Space Mono"',
    'italic 400 12px "Space Mono"'
  ];
  await Promise.all(specs.map(f => document.fonts.load(f)));
  await logoReady;
}

function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

function drawSpacedText(ctx, text, cx, y, spacing) {
  const chars = text.split('');
  const widths = chars.map(c => ctx.measureText(c).width);
  const total = widths.reduce((a, b) => a + b, 0) + spacing * (chars.length - 1);
  const prevAlign = ctx.textAlign;
  ctx.textAlign = 'left';
  let x = cx - total / 2;
  chars.forEach((c, i) => {
    ctx.fillText(c, x, y);
    x += widths[i] + spacing;
  });
  ctx.textAlign = prevAlign;
}

async function buildCard(amount) {
  await ensureAssetsReady();

  const W = 640, H = 820, M = 18, R = 26;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  const canvas = document.createElement('canvas');
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'center';

  // Card body
  roundRectPath(ctx, M, M, W - 2 * M, H - 2 * M, R);
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#0b1220');
  bgGrad.addColorStop(0.5, '#0d1526');
  bgGrad.addColorStop(1, '#111e33');
  ctx.fillStyle = bgGrad;
  ctx.fill();

  ctx.save();
  roundRectPath(ctx, M, M, W - 2 * M, H - 2 * M, R);
  ctx.clip();

  const glow = ctx.createRadialGradient(W / 2, 508, 40, W / 2, 508, 280);
  glow.addColorStop(0, 'rgba(56,189,248,.16)');
  glow.addColorStop(1, 'rgba(56,189,248,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  if (logoImg.naturalWidth) {
    const logoSize = 96;
    ctx.drawImage(logoImg, W / 2 - logoSize / 2, 54, logoSize, logoSize);
  }

  ctx.fillStyle = '#ec4899';
  ctx.font = '700 13px "Space Mono"';
  drawSpacedText(ctx, 'SCAN & PAY', W / 2, 182, 6);

  const amtGrad = ctx.createLinearGradient(W / 2 - 140, 0, W / 2 + 140, 0);
  amtGrad.addColorStop(0, '#38bdf8');
  amtGrad.addColorStop(0.55, '#ec4899');
  amtGrad.addColorStop(1, '#f9a8d4');
  ctx.font = '700 68px "Space Grotesk"';
  ctx.fillStyle = amtGrad;
  ctx.fillText('₹' + amount, W / 2, 256);

  ctx.font = '400 15px "Space Grotesk"';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('to Prism3D', W / 2, 298);

  const panelSize = 344, panelX = W / 2 - panelSize / 2, panelY = 336;
  roundRectPath(ctx, panelX, panelY, panelSize, panelSize, 20);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  const upiLink = buildUpiLink(amount);
  const qr = qrcode(0, 'H');
  qr.addData(upiLink);
  qr.make();
  const count = qr.getModuleCount();
  const qrPad = 26;
  const qrSize = panelSize - qrPad * 2;
  const cell = qrSize / count;
  ctx.fillStyle = '#0b1220';
  for (let row = 0; row < count; row++) {
    for (let col = 0; col < count; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(panelX + qrPad + col * cell, panelY + qrPad + row * cell, cell + 0.6, cell + 0.6);
      }
    }
  }

  const badgeR = 34;
  const bx = panelX + panelSize / 2, by = panelY + panelSize / 2;
  ctx.beginPath();
  ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = '#e5e9f0';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  if (logoImg.naturalWidth) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(bx, by, badgeR - 6, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(logoImg, bx - (badgeR - 6), by - (badgeR - 6), (badgeR - 6) * 2, (badgeR - 6) * 2);
    ctx.restore();
  }

  ctx.font = '400 13px "Space Mono"';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('UPI ID · ' + UPI_PA, W / 2, panelY + panelSize + 40);

  ctx.font = 'italic 400 12px "Space Mono"';
  ctx.fillStyle = 'rgba(148,197,255,.55)';
  ctx.fillText('crafted layer by layer', W / 2, H - M - 34);

  ctx.restore();

  roundRectPath(ctx, M, M, W - 2 * M, H - 2 * M, R);
  ctx.strokeStyle = 'rgba(148,197,255,.18)';
  ctx.lineWidth = 1;
  ctx.stroke();

  return canvas;
}

/* ════════════════════════════════════════
   UI WIRING
════════════════════════════════════════ */
const amountInput  = document.getElementById('amount');
const genBtn       = document.getElementById('genBtn');
const cardLoading  = document.getElementById('cardLoading');
const cardPreview  = document.getElementById('cardPreview');
const upiLinkEl    = document.getElementById('upiLink');
const downloadBtn  = document.getElementById('downloadBtn');
const shareBtn     = document.getElementById('shareBtn');
const payLink      = document.getElementById('payLink');

let latestBlob = null;
let latestAmount = null;

async function generate() {
  const amount = parseFloat(amountInput.value);
  if (!amount || amount <= 0) {
    cardPreview.style.display = 'none';
    cardLoading.style.display = 'flex';
    cardLoading.textContent = 'Enter a valid amount first';
    upiLinkEl.textContent = '';
    payLink.removeAttribute('href');
    latestBlob = null;
    return;
  }

  cardPreview.style.display = 'none';
  cardLoading.style.display = 'flex';
  cardLoading.textContent = 'Building card…';

  const canvas = await buildCard(amount);
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
  latestBlob = blob;
  latestAmount = amount;

  const url = URL.createObjectURL(blob);
  cardPreview.onload = () => {
    cardLoading.style.display = 'none';
    cardPreview.style.display = 'block';
  };
  cardPreview.src = url;

  upiLinkEl.textContent = buildUpiLink(amount);
  payLink.href = buildUpiLink(amount);
}

downloadBtn.addEventListener('click', () => {
  if (!latestBlob) return;
  const url = URL.createObjectURL(latestBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'prism3d-payment-qr.png';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
});

if (navigator.share) {
  shareBtn.style.display = '';
  shareBtn.addEventListener('click', async () => {
    if (!latestBlob) return;
    const file = new File([latestBlob], 'prism3d-payment-qr.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Prism3D Payment', text: 'Scan to pay ₹' + latestAmount + ' to Prism3D' });
      } catch (e) { /* cancelled */ }
    } else {
      downloadBtn.click();
    }
  });
}

genBtn.addEventListener('click', generate);
amountInput.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

generate();
</script>
